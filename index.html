<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quizs-Evo | Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-admin { background: #28a745; color: white; margin-top: 20px; }
        .hidden { display: none; }
        #mensaje { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2 id="titulo">Bienvenido</h2>
        <input type="email" id="email" placeholder="Tu correo">
        <input type="password" id="password" placeholder="Tu contraseña">
        <button class="btn-primary" id="btn-login">Entrar</button>
        <button style="background:none; color:#007bff; border:none; text-decoration:underline;" id="btn-switch">¿No tienes cuenta? Regístrate</button>
        <p id="mensaje"></p>
    </div>

    <div id="app-section" class="hidden">
        <h2>¡Hola!</h2>
        <p id="user-email"></p>
        
        <div id="admin-tools" class="hidden">
            <hr>
            <h3>Panel de Control</h3>
            <button class="btn-admin" onclick="alert('Próximamente: Selector de CSV')">Importar Usuarios desde CSV</button>
        </div>

        <button style="background:#dc3545; color:white;" id="btn-logout">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Tu configuración oficial
    const firebaseConfig = {
        apiKey: "AIzaSyBpMD8ezkxeG7qeJHTAgSuXmyX1ma7M7Ng",
        authDomain: "quizs-evo.firebaseapp.com",
        projectId: "quizs-evo",
        storageBucket: "quizs-evo.firebasestorage.app",
        messagingSenderId: "424341251554",
        appId: "1:424341251554:web:84bf886ea4dc965cba45bb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // --- CAMBIA ESTO POR TU CORREO PARA SER EL JEFE ---
    const CORREO_ADMIN = "tejelonsos@gmail.com"; 

    // Lógica de Botones
    document.getElementById('btn-login').onclick = async () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, mail, pass);
        } catch (e) {
            try {
                await createUserWithEmailAndPassword(auth, mail, pass);
            } catch (err) {
                document.getElementById('mensaje').innerText = "Error: " + err.message;
            }
        }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // Observador: Detecta quién entra y quién sale
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;

            // Si el correo coincide, mostramos herramientas de Admin
            if (user.email === CORREO_ADMIN) {
                document.getElementById('admin-tools').classList.remove('hidden');
            }
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });
</script>
</body>
</html>
