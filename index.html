<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quizs-Evo | Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-admin { background: #28a745; color: white; margin-top: 20px; }
        .hidden { display: none; }
        #mensaje { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2 id="titulo">Bienvenido</h2>
        <input type="email" id="email" placeholder="Tu correo">
        <input type="password" id="password" placeholder="Tu contraseña">
        <button class="btn-primary" id="btn-login">Entrar / Registrarse</button>
        <p id="mensaje"></p>
    </div>

    <div id="app-section" class="hidden">
        <h2>¡Hola!</h2>
        <p id="user-email"></p>
        
        <div id="admin-tools" class="hidden">
            <hr>
            <h3>Panel de Control</h3>
            <button class="btn-admin" id="btn-importar">Importar Usuarios desde CSV</button>
        </div>

        <div id="lista-usuarios-section" style="margin-top:20px; text-align:left;">
            <h4>Usuarios Registrados</h4>
            <table id="tabla-usuarios" style="width:100%; border-collapse: collapse; font-size: 12px;">
                <thead>
                    <tr style="background:#eee;">
                        <th style="padding:5px; border:1px solid #ddd;">Email</th>
                        <th style="padding:5px; border:1px solid #ddd;">Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    </tbody>
            </table>
        </div>

        <button style="background:#dc3545; color:white;" id="btn-logout">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpMD8ezkxeG7qeJHTAgSuXmyX1ma7M7Ng",
        authDomain: "quizs-evo.firebaseapp.com",
        projectId: "quizs-evo",
        storageBucket: "quizs-evo.firebasestorage.app",
        messagingSenderId: "424341251554",
        appId: "1:424341251554:web:84bf886ea4dc965cba45bb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Tu correo de administrador
    const CORREO_ADMIN = "sherlockes@gmail.com";

    // Lógica de Login
    document.getElementById('btn-login').onclick = async () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!mail || !pass) return;
        
        try {
            await signInWithEmailAndPassword(auth, mail, pass);
        } catch (e) {
            try {
                await createUserWithEmailAndPassword(auth, mail, pass);
            } catch (err) {
                document.getElementById('mensaje').innerText = "Error: " + err.message;
            }
        }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;

            if (user.email === CORREO_ADMIN) {
                document.getElementById('admin-tools').classList.remove('hidden');
            }
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('mensaje').innerText = "";
        }
    });

    // --- LÓGICA DE IMPORTACIÓN ---
    const inputArchivo = document.createElement('input');
    inputArchivo.type = 'file';
    inputArchivo.accept = '.csv';

    document.getElementById('btn-importar').onclick = () => inputArchivo.click();

    inputArchivo.onchange = (e) => {
        const archivo = e.target.files[0];
        Papa.parse(archivo, {
            header: true,
            skipEmptyLines: true,
            complete: async function(results) {
                console.log("Iniciando importación...");
                for (let usuario of results.data) {
                    if(usuario.email && usuario.password) {
                        try {
                            // 1. Crea el acceso (Auth)
                            await createUserWithEmailAndPassword(auth, usuario.email, usuario.password);
                            
                            // 2. Crea la ficha en la tabla (Firestore)
                            await setDoc(doc(db, "usuarios", usuario.email), {
                                email: usuario.email,
                                rol: "alumno"
                            });
                            
                            console.log("Creado: " + usuario.email);
                        } catch (error) {
                            console.log("Aviso: " + usuario.email + " ya existe o hay error.");
                        }
                    }
                }
                alert("Importación finalizada. ¡No olvides cerrar sesión y volver a entrar como Admin si tu correo cambió en pantalla!");
            }
        });
    };

    // Hacer que la función de borrar sea accesible desde la tabla
    window.borrarUsuario = async (id) => {
        if(confirm("¿Seguro que quieres borrar a este alumno de la lista?")) {
            try {
                await deleteDoc(doc(db, "usuarios", id));
                alert("Usuario eliminado de la base de datos.");
            } catch (e) {
                alert("Error al borrar: " + e.message);
            }
        }
    };

    // Escuchar cambios en la base de datos y actualizar la tabla automáticamente
    onAuthStateChanged(auth, (user) => {
        const CORREO_ADMIN = "sherlockes@gmail.com"; // Asegúrate de que este es tu correo
        
        if (user && user.email === CORREO_ADMIN) {
            // Si eres el admin, trae la lista de usuarios de la colección "usuarios"
            onSnapshot(collection(db, "usuarios"), (snapshot) => {
                const tabla = document.getElementById('cuerpo-tabla');
                if(!tabla) return; // Por si acaso no encuentra el elemento
                
                tabla.innerHTML = ""; 
                snapshot.forEach((doc) => {
                    const u = doc.data();
                    tabla.innerHTML += `
                        <tr>
                            <td style="padding:8px; border:1px solid #ddd;">${u.email}</td>
                            <td style="padding:8px; border:1px solid #ddd; text-align:center;">
                                <button onclick="borrarUsuario('${doc.id}')" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Borrar</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }
    });
</script>
</body>
</html>
