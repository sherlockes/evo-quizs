<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quizs-Evo | Admin Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 30px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 600px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-admin { background: #28a745; color: white; margin-bottom: 20px; }
        .hidden { display: none; }
        #mensaje { color: red; font-size: 14px; margin-top: 10px; }
        
        .tabla-container { margin-top: 20px; text-align: left; max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }
        
        /* Botones de acción */
        .btn-accion { padding: 4px 8px; font-size: 11px; width: auto; margin-right: 5px; }
        .btn-edit { background: #ffc107; color: #212529; }
        .btn-borrar { background: #dc3545; color: white; }
        .badge-curso { background: #e9ecef; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2>Quizs-Evo</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn-primary" id="btn-login">Entrar</button>
        <p id="mensaje"></p>
    </div>

    <div id="app-section" class="hidden">
        <h2>Panel de Control</h2>
        <p>Admin: <b id="user-email"></b></p>
        
        <div id="admin-tools" class="hidden">
            <hr>
            <button class="btn-admin" id="btn-importar">📂 Importar Alumnos (CSV)</button>
            
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Curso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla"></tbody>
                </table>
            </div>
        </div>

        <button style="background:#6c757d; color:white; margin-top: 20px;" id="btn-logout">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, updateDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpMD8ezkxeG7qeJHTAgSuXmyX1ma7M7Ng",
        authDomain: "quizs-evo.firebaseapp.com",
        projectId: "quizs-evo",
        storageBucket: "quizs-evo.firebasestorage.app",
        messagingSenderId: "424341251554",
        appId: "1:424341251554:web:84bf886ea4dc965cba45bb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const CORREO_ADMIN = "sherlockes@gmail.com"; 

    // Autenticación
    document.getElementById('btn-login').onclick = async () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        try { await signInWithEmailAndPassword(auth, mail, pass); } 
        catch (e) { document.getElementById('mensaje').innerText = "Error: " + e.message; }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            if (user.email === CORREO_ADMIN) {
                document.getElementById('admin-tools').classList.remove('hidden');
                activarSincronizacion();
            }
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    });

    // --- FUNCIONES DE LA TABLA ---

    function activarSincronizacion() {
        onSnapshot(collection(db, "usuarios"), (snapshot) => {
            const tabla = document.getElementById('cuerpo-tabla');
            tabla.innerHTML = ""; 
            snapshot.forEach((docSnap) => {
                const u = docSnap.data();
                const id = docSnap.id;
                tabla.innerHTML += `
                    <tr>
                        <td>${u.email}</td>
                        <td><span class="badge-curso">${u.curso || '---'}</span></td>
                        <td>
                            <button class="btn-accion btn-edit" onclick="editarCurso('${id}', '${u.curso || ''}')">Editar</button>
                            <button class="btn-accion btn-borrar" onclick="borrarAlumno('${id}')">X</button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    // Función para editar solo el curso
    window.editarCurso = async (id, cursoActual) => {
        const nuevoCurso = prompt("Editar curso para " + id + ":", cursoActual);
        if (nuevoCurso !== null && nuevoCurso !== cursoActual) {
            try {
                const docRef = doc(db, "usuarios", id);
                await updateDoc(docRef, { curso: nuevoCurso });
                alert("Curso actualizado con éxito");
            } catch (e) {
                alert("Error al actualizar: " + e.message);
            }
        }
    };

    window.borrarAlumno = async (id) => {
        if(confirm("¿Seguro que quieres eliminar a " + id + "?")) {
            await deleteDoc(doc(db, "usuarios", id));
        }
    };

    // Importación CSV
    const inputArchivo = document.createElement('input');
    inputArchivo.type = 'file';
    inputArchivo.accept = '.csv';
    document.getElementById('btn-importar').onclick = () => inputArchivo.click();

    inputArchivo.onchange = (e) => {
        const archivo = e.target.files[0];
        Papa.parse(archivo, {
            header: true,
            skipEmptyLines: true,
            complete: async function(results) {
                for (let fila of results.data) {
                    if(fila.email) {
                        try {
                            // Intentamos crear el usuario en Auth (si ya existe, saltará al siguiente paso)
                            await createUserWithEmailAndPassword(auth, fila.email, fila.password || "123456");
                        } catch (err) {}
                        
                        // Guardamos/Sobrescribimos en Firestore
                        await setDoc(doc(db, "usuarios", fila.email), {
                            email: fila.email,
                            rol: "alumno",
                            curso: fila.curso || "General"
                        });
                    }
                }
                alert("Importación finalizada.");
            }
        });
    };
</script>
</body>
</html>
