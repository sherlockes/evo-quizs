<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizs-Evo | Gestión Total</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="section-login">
    <h2>Cuestionarios de Física y Química</h2>
    <h3>IES Ángel Sanz Briz</h3>
    
    <input type="email" id="l-email" placeholder="Correo">
    
    <div class="login-row">
        <input type="password" id="l-password" placeholder="Contraseña">
        <button class="btn-primary" id="btn-login">Entrar</button>
    </div>
    
    <p id="mensaje" style="color:red; font-size:13px;"></p>
    </div>

    <div id="section-admin" class="hidden">
        <h2 style="color: #28a745;">Administración</h2>
        <div style="display: flex; gap: 5px;">
            <button class="btn-tab active" id="tab-btn-alumnos">👥 Alumnos</button>
            <button class="btn-tab" id="tab-btn-quizzes">📝 Cuestionarios</button>

            <button class="btn-tab logout" 
                    style="margin-left: auto; background: var(--err-color); color: white; border: none;">
                🚪 Salir
            </button>
        </div>

        <div id="view-alumnos" class="admin-content">
            <h4>Guardados</h4>
            <div class="tabla-container">
                <table>
                    <thead><tr><th>Email</th><th>Curso</th><th>Acción</th></tr></thead>
                    <tbody id="cuerpo-tabla"></tbody>
                </table>
            </div>
            <h4>Nuevo</h4>
            <div class="form-manual">
                <div class="flex-row" style="display: flex; gap: 10px;">
                    <input type="email" id="m-email" placeholder="Email" style="flex: 1; margin: 0;">
                    <input type="password" id="m-pass" placeholder="Pass" style="flex: 1; margin: 0;">
                    <input type="text" id="m-curso" placeholder="Curso" maxlength="6" 
                           style="width: 80px; text-align: center; margin: 0;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: stretch;">
                    <button id="btn-crear-manual" class="btn-tab" style="background: #546e7a; color: white"> 💾 Guardar </button>
                    <button id="btn-importar" class="btn-tab" style="background: #28a745; color: white"> 📂 Importar lista (*.csv) </button>
                    <button id="btn-borrar-todo" class="btn-tab" style="background: #dc3545; color: white"> ⚠️ Borrar todos </button>
                </div>
            </div>

            
            <input type="file" id="csv-input" accept=".csv" style="display: none;">
        </div>

        <div id="view-quizzes" class="admin-content hidden">
            <h4>Guardados</h4>
            <div class="tabla-container">
                <table>
                    <thead><tr><th>Título</th><th>Curso</th><th>Estado</th><th>Acción</th></tr></thead>
                    <tbody id="tabla-quizzes"></tbody>
                </table>
            </div>
            <h4>Nuevo</h4>
	    <div class="form-quiz-container">
		<input type="text" id="q-titulo" placeholder="Título del cuestionario" class="q-input-titulo">
		
		<div class="q-controls-row">
		    <input type="text" id="q-curso" placeholder="Curso" maxlength="6" class="q-input-curso">

		    <label class="q-label-habilitado">
			<input type="checkbox" id="q-activo" checked> 
			<span>Habilitado</span>
		    </label>

		    <button class="btn-primary" id="btn-guardar-quiz">Guardar</button>
		</div>
	    </div>
	    <hr style="margin: 30px 0; border: none; border-top: 2px dashed #eee;">

            <div id="seccion-resultados-integrada" class="hidden" style="margin-top: 10px; background: #fdfdfd; padding: 15px; border: 1px solid #eee; border-radius: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h4 id="res-titulo-quiz" style="margin: 0; color: #546e7a;">Resultados</h4>
                    
                    <div style="display: flex; gap: 5px;">
                        <button onclick="exportarResultadosExcel()" style="background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">📊 Excel</button>
                        <button onclick="borrarResultadosQuiz()" style="background: var(--err-color); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">⚠️ Limpiar</button>
                        <button onclick="ocultarResultados()" style="background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;">✖</button>
                    </div>
                </div>
                
                <div class="tabla-container">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: #f1f1f1;">
                                <th style="padding: 8px; text-align: left; font-size: 13px;">Fecha</th>
                                <th style="padding: 8px; text-align: left; font-size: 13px;">Alumno</th>
                                <th style="padding: 8px; width: 100px; text-align: center; font-size: 13px;">Tiempo</th>
                                <th style="padding: 8px; width: 60px; text-align: center; font-size: 13px;">Nota</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-resultados-body">
                            </tbody>
                    </table>
                </div>
            </div>      
        </div>

        <div id="view-editor" class="admin-content hidden tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 id="editor-titulo-quiz" style="margin: 0; color: #546e7a;">
                    Editor de Cuestionario
                </h3>
                
                <button onclick="cerrarEditor()" 
                        style="background: none; border: none; font-size: 30px; cursor: pointer; color: #666; line-height: 0.8; padding: 0; margin: 0;">
                    &times;
                </button>
            </div>

            <div class="herramientas-editor" style="display: flex; gap: 5px; margin-bottom: 15px; position: sticky; top: 0; background: white; z-index: 100; padding: 10px 0; border-bottom: 1px solid #eee;">
                <input type="file" id="importar-json" accept=".json" style="display:none">
                <button style="background:#6c757d; color:white; flex:1;" onclick="document.getElementById('importar-json').click()">📂 Importar PC</button>
                <button style="background:#28a745; color:white; flex:1;" onclick="nuevaPregunta()">➕ Pregunta</button>
                <button style="background:#007bff; color:white; flex:2; font-weight:bold;" onclick="guardarEnNube()">💾 GUARDAR CAMBIOS</button>
                <button style="background:#adb5bd; color:white; flex:1;" onclick="descargarJSON()">📥 Backup</button>
            </div>
            
            <div id="lista-preguntas-editor"></div>
        </div>
    </div>

    <div id="section-alumno" class="hidden">
        <div style="background:#e7f3ff; padding:20px; border-radius:8px; text-align: left;">
            <h2>Mi Panel</h2>
            <p>Alumno: <b id="alumno-email"></b> | Curso: <span id="alumno-curso">...</span></p>
            <hr>
            <div id="lista-examenes"></div>
        </div>
        <br>
        <button style="background:#6c757d; color:white; width:100%" class="logout">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
    import { auth, CORREO_ADMIN, db } from './config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { activarSincronizacionAlumnos, activarSincronizacionQuizzes, crearAlumnoManual, guardarNuevoQuiz, renderizarEditor, importarAlumnosCSV, borrarTodosLosAlumnos } from './admin.js';
    import { cargarListaExamenes } from './alumno.js';

    // --- LÓGICA DE PESTAÑAS (Refactorizada) ---
    window.showTab = (viewId, btnId = null) => {
        // 1. Ocultar todas las vistas
        document.querySelectorAll('.admin-content').forEach(v => v.classList.add('hidden'));
        
        // 2. Quitar el estado "active" de todos los botones
        document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));

        // --- Ocultar siempre la sección de resultados al cambiar ---
        const seccionRes = document.getElementById('seccion-resultados-integrada');
        if (seccionRes) seccionRes.classList.add('hidden');
        // -----------------------------------------------------------------------

        // 3. Mostrar la vista que queremos
        const targetView = document.getElementById(viewId);
        if (targetView) targetView.classList.remove('hidden');

        // 4. Si venimos de un clic (hay btnId), marcar ese botón como activo
        if (btnId) {
            const btn = document.getElementById(btnId);
            if (btn) btn.classList.add('active');
        }
    };

    // Asignamos los clics manualmente a los botones que SÍ existen
    document.getElementById('tab-btn-alumnos').onclick = () => showTab('view-alumnos', 'tab-btn-alumnos');
    document.getElementById('tab-btn-quizzes').onclick = () => showTab('view-quizzes', 'tab-btn-quizzes');

    // Login
    document.getElementById('btn-login').onclick = async () => {
        const m = document.getElementById('l-email').value;
        const p = document.getElementById('l-password').value;
        try { await signInWithEmailAndPassword(auth, m, p); } 
        catch (e) { document.getElementById('mensaje').innerText = "Credenciales incorrectas"; }
    };

    document.querySelectorAll('.logout').forEach(b => b.onclick = () => signOut(auth));

    onAuthStateChanged(auth, async (user) => {
        const sL = document.getElementById('section-login'), sAd = document.getElementById('section-admin'), sAl = document.getElementById('section-alumno');
        sL.classList.add('hidden'); sAd.classList.add('hidden'); sAl.classList.add('hidden');

        if (user) {
            if (user.email === CORREO_ADMIN) {
                sAd.classList.remove('hidden');
                activarSincronizacionAlumnos();
                activarSincronizacionQuizzes();
            } else {
                sAl.classList.remove('hidden');
                document.getElementById('alumno-email').innerText = user.email;
                const d = await getDoc(doc(db, "usuarios", user.email));
                if(d.exists()) {
                    document.getElementById('alumno-curso').innerText = d.data().curso;
                    cargarListaExamenes(d.data().curso);
                }
            }
        } else { sL.classList.remove('hidden'); }
    });

    // Eventos Admin
    document.getElementById('btn-crear-manual').onclick = async () => {
        const e = document.getElementById('m-email').value, p = document.getElementById('m-pass').value, c = document.getElementById('m-curso').value;
        try {
            await crearAlumnoManual(e, p, c);
            alert("Alumno creado");
            document.getElementById('m-email').value = ""; document.getElementById('m-pass').value = "";
        } catch(err) { alert(err.message); }
    };

    document.getElementById('btn-guardar-quiz').onclick = async () => {
        const d = {
            titulo: document.getElementById('q-titulo').value,
            curso: document.getElementById('q-curso').value,
            ruta: document.getElementById('q-ruta').value,
            activo: document.getElementById('q-activo').checked
        };
        try {
            await guardarNuevoQuiz(d);
            alert("Registrado");
            document.getElementById('q-titulo').value = ""; document.getElementById('q-ruta').value = "";
        } catch(e) { alert(e.message); }
    };

    const btnImportar = document.getElementById('btn-importar');
    const csvInput = document.getElementById('csv-input');

    if (btnImportar && csvInput) {
        btnImportar.onclick = () => csvInput.click();

        csvInput.onchange = (e) => {
            const archivo = e.target.files[0];
            if (!archivo) return;

            Papa.parse(archivo, {
                header: true,
                skipEmptyLines: true,
                dynamicTyping: true,
                // Eliminamos la restricción de coma y dejamos que PapaParse decida
                complete: async (results) => {
                    if (results.data.length === 0) {
                        alert("El archivo CSV parece estar vacío.");
                        return;
                    }
                    
                    btnImportar.innerText = "⌛ Procesando...";
                    btnImportar.disabled = true;

                    try {
                        const resumen = await importarAlumnosCSV(results.data);
                        alert(`Importación finalizada:\n✅ Éxitos: ${resumen.exitos}\n❌ Errores: ${resumen.errores}\n\nNota: Asegúrate de que el CSV tenga las columnas: email, password, curso`);
                    } catch (err) {
                        alert("Error crítico: " + err.message);
                    } finally {
                        btnImportar.innerText = "📂 Importar CSV";
                        btnImportar.disabled = false;
                        csvInput.value = "";
                    }
                }
            });
        };
    }

    // Lógica para Borrar Todos los Alumnos
    document.getElementById('btn-borrar-todo').onclick = async () => {
        const conf1 = confirm("¿Estás seguro de que quieres borrar TODOS los alumnos? Esta acción no se puede deshacer.");
        if (conf1) {
            const conf2 = confirm("¡ÚLTIMO AVISO! Se eliminarán todos los registros de alumnos del sistema. ¿Proceder?");
            if (conf2) {
                try {
                    const btn = document.getElementById('btn-borrar-todo');
                    btn.innerText = "⌛ Borrando...";
                    btn.disabled = true;

                    const total = await borrarTodosLosAlumnos();
                    
                    alert(`Limpieza completada. Se han eliminado ${total} alumnos.`);
                } catch (e) {
                    alert("Error al borrar: " + e.message);
                } finally {
                    document.getElementById('btn-borrar-todo').innerText = "⚠️ Borrar Alumnos";
                    document.getElementById('btn-borrar-todo').disabled = false;
                }
            }
        }
    };
</script>
</body>
</html>
