<script type="module">
    import { auth, CORREO_ADMIN, db } from './js/config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Importamos las nuevas piezas
    import { activarSincronizacionAlumnos, activarSincronizacionQuizzes, crearAlumnoManual, guardarNuevoQuiz } from './js/admin.js';
    import { cargarListaExamenes } from './js/alumno.js';

    // Login
    document.getElementById('btn-login').onclick = async () => {
        const m = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await signInWithEmailAndPassword(auth, m, p); } 
        catch (e) { document.getElementById('mensaje').innerText = "Error de acceso"; }
    };

    // Logout
    document.querySelectorAll('.logout').forEach(b => b.onclick = () => signOut(auth));

    // Observador de sesión
    onAuthStateChanged(auth, async (user) => {
        const sL = document.getElementById('section-login');
        const sAd = document.getElementById('section-admin');
        const sAl = document.getElementById('section-alumno');

        if (user) {
            sL.classList.add('hidden');
            if (user.email === CORREO_ADMIN) {
                sAd.classList.remove('hidden');
                activarSincronizacionAlumnos();
                activarSincronizacionQuizzes();
            } else {
                sAl.classList.remove('hidden');
                document.getElementById('alumno-email').innerText = user.email;
                const d = await getDoc(doc(db, "usuarios", user.email));
                if(d.exists()) {
                    document.getElementById('alumno-curso').innerText = d.data().curso;
                    cargarListaExamenes(d.data().curso);
                }
            }
        } else {
            sL.classList.remove('hidden'); sAd.classList.add('hidden'); sAl.classList.add('hidden');
        }
    });

    // Delegación de eventos del formulario Admin
    document.getElementById('btn-crear-manual').onclick = async () => {
        const email = document.getElementById('m-email').value;
        const pass = document.getElementById('m-pass').value;
        const curso = document.getElementById('m-curso').value;
        await crearAlumnoManual(email, pass, curso);
        alert("Usuario creado");
    };

    document.getElementById('btn-guardar-quiz').onclick = async () => {
        const datos = {
            titulo: document.getElementById('q-titulo').value,
            curso: document.getElementById('q-curso').value,
            ruta: document.getElementById('q-ruta').value,
            activo: document.getElementById('q-activo').checked
        };
        await guardarNuevoQuiz(datos);
        alert("Quiz guardado");
    };
</script>
