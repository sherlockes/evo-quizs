<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quizs-Evo | Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-admin { background: #28a745; color: white; margin-top: 20px; }
        .hidden { display: none; }
        #mensaje { color: red; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h2 id="titulo">Bienvenido</h2>
        <input type="email" id="email" placeholder="Tu correo">
        <input type="password" id="password" placeholder="Tu contraseña">
        <button class="btn-primary" id="btn-login">Entrar / Registrarse</button>
        <p id="mensaje"></p>
    </div>

    <div id="app-section" class="hidden">
        <h2>¡Hola!</h2>
        <p id="user-email"></p>
        
        <div id="admin-tools" class="hidden">
            <hr>
            <h3>Panel de Control</h3>
            <button class="btn-admin" id="btn-importar">Importar Usuarios desde CSV</button>
        </div>

        <div id="lista-usuarios-section" style="margin-top:20px; text-align:left;">
            <h4>Usuarios Registrados</h4>
            <table id="tabla-usuarios" style="width:100%; border-collapse: collapse; font-size: 12px;">
                <thead>
                    <tr style="background:#eee;">
                        <th style="padding:5px; border:1px solid #ddd;">Email</th>
                        <th style="padding:5px; border:1px solid #ddd;">Acción</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                    </tbody>
            </table>
        </div>

        <button style="background:#dc3545; color:white;" id="btn-logout">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBpMD8ezkxeG7qeJHTAgSuXmyX1ma7M7Ng",
        authDomain: "quizs-evo.firebaseapp.com",
        projectId: "quizs-evo",
        storageBucket: "quizs-evo.firebasestorage.app",
        messagingSenderId: "424341251554",
        appId: "1:424341251554:web:84bf886ea4dc965cba45bb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Tu correo de administrador
    const CORREO_ADMIN = "sherlockes@gmail.com";

    // Lógica de Login
    document.getElementById('btn-login').onclick = async () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!mail || !pass) return;
        
        try {
            await signInWithEmailAndPassword(auth, mail, pass);
        } catch (e) {
            try {
                await createUserWithEmailAndPassword(auth, mail, pass);
            } catch (err) {
                document.getElementById('mensaje').innerText = "Error: " + err.message;
            }
        }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;

            if (user.email === CORREO_ADMIN) {
                document.getElementById('admin-tools').classList.remove('hidden');
            }
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('mensaje').innerText = "";
        }
    });

    // --- LÓGICA DE IMPORTACIÓN ---
    const inputArchivo = document.createElement('input');
    inputArchivo.type = 'file';
    inputArchivo.accept = '.csv';

    document.getElementById('btn-importar').onclick = () => inputArchivo.click();

    inputArchivo.onchange = (e) => {
        const archivo = e.target.files[0];
        Papa.parse(archivo, {
            header: true,
            skipEmptyLines: true,
            complete: async function(results) {
                console.log("Iniciando importación...");
                for (let usuario of results.data) {
                    if(usuario.email && usuario.password) {
                        try {
                            // Nota: Esto creará los usuarios en Firebase
                            await createUserWithEmailAndPassword(auth, usuario.email, usuario.password);
                            console.log("Creado: " + usuario.email);
                        } catch (error) {
                            console.log("Aviso: " + usuario.email + " ya existe o tiene error.");
                        }
                    }
                }
                alert("Importación finalizada. ¡No olvides cerrar sesión y volver a entrar como Admin si tu correo cambió en pantalla!");
            }
        });
    };
</script>
</body>
</html>
